defaults:
  - hydra: default
  - datamodule: av2
  - model: model_forecast
  - _self_

seed: 2333
monitor: val_loss
save_top_k: 10

data_root:
checkpoint:
pretrained_weights:
anchor_paths:
  vehicle: assets/anchors/av2_vehicle_bus_k6.pt
  cyclist: assets/anchors/av2_cyclist_motorcyclist_k6.pt
  pedestrian: assets/anchors/av2_pedestrian_k6.pt
output: ${model.name}-${model.phase}

# trainer
num_workers: 8
gpus: 1
sync_bn: true
batch_size: 32
epochs: 60
warmup_epochs: 10

# optimizer
lr: 0.001
weight_decay: 1e-4
gradient_clip_val: 5
gradient_clip_algorithm: norm

limit_train_batches:
limit_val_batches:
limit_test_batches:
overfit_batches: 0.0
log_model: all
test: false

wandb: disable
